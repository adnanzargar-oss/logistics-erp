services:
  - type: web
    name: logistics-erp-api
    runtime: node
    buildCommand: cd server && npm install && npm run build
    startCommand: cd server && node dist/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATA_DIR
        value: /data
    disk:
      name: sqlite-data
      mountPath: /data
      sizeGB: 1
